<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" fill="url(#bg)" rx="24"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="210" r="150" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="210" r="120" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.5"/>
  
  <!-- Connection lines -->
  <g stroke="url(#ring)" stroke-width="1.5" opacity="0.6">
    <line x1="256" y1="60" x2="256" y2="90"/>
    <line x1="396" y1="135" x2="370" y2="160"/>
    <line x1="396" y1="285" x2="370" y2="260"/>
    <line x1="256" y1="360" x2="256" y2="330"/>
    <line x1="116" y1="285" x2="142" y2="260"/>
    <line x1="116" y1="135" x2="142" y2="160"/>
  </g>
  
  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="256" cy="60" r="12" fill="url(#node)"/>
    <circle cx="396" cy="135" r="10" fill="url(#node)"/>
    <circle cx="396" cy="285" r="10" fill="url(#node)"/>
    <circle cx="256" cy="360" r="12" fill="url(#node)"/>
    <circle cx="116" cy="285" r="10" fill="url(#node)"/>
    <circle cx="116" cy="135" r="10" fill="url(#node)"/>
  </g>
  
  <!-- Inner ring -->
  <circle cx="256" cy="210" r="80" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.7"/>
  
  <!-- Center hub -->
  <circle cx="256" cy="210" r="55" fill="#1a1a2e" stroke="url(#ring)" stroke-width="2"/>
  <circle cx="256" cy="210" r="40" fill="url(#ring)"/>
  
  <!-- AP letters -->
  <text x="256" y="220" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700">AP</text>
  
  <!-- Title -->
  <text x="256" y="450" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600">AGENT PROTOCOL</text>
  <text x="256" y="478" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="3">UNIVERSAL AGENT COMMUNICATION</text>
</svg>
