<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="200" cy="200" r="150" fill="url(#grad1)" opacity="0.15"/>
  
  <!-- Network nodes -->
  <!-- Center node -->
  <circle cx="200" cy="200" r="40" fill="url(#grad1)"/>
  <circle cx="200" cy="200" r="30" fill="white" opacity="0.9"/>
  <text x="200" y="205" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1" text-anchor="middle">AP</text>
  
  <!-- Outer nodes -->
  <circle cx="200" cy="60" r="25" fill="url(#grad2)"/>
  <circle cx="325" cy="140" r="25" fill="url(#grad2)"/>
  <circle cx="325" cy="260" r="25" fill="url(#grad2)"/>
  <circle cx="200" cy="340" r="25" fill="url(#grad2)"/>
  <circle cx="75" cy="260" r="25" fill="url(#grad2)"/>
  <circle cx="75" cy="140" r="25" fill="url(#grad2)"/>
  
  <!-- Node labels -->
  <text x="200" y="55" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" text-anchor="middle">Text</text>
  <text x="335" y="140" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" text-anchor="start">Image</text>
  <text x="335" y="260" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" text-anchor="start">Audio</text>
  <text x="200" y="355" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" text-anchor="middle">Code</text>
  <text x="65" y="260" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" text-anchor="end">Video</text>
  <text x="65" y="140" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" text-anchor="end">Data</text>
  
  <!-- Connection lines -->
  <line x1="200" y1="160" x2="200" y2="85" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
  <line x1="235" y1="225" x2="300" y2="155" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
  <line x1="235" y1="225" x2="300" y2="245" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="240" x2="200" y2="315" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
  <line x1="165" y1="225" x2="100" y2="245" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
  <line x1="165" y1="225" x2="100" y2="155" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
  
  <!-- Outer ring connections -->
  <path d="M 200 85 A 115 115 0 0 1 300 155" stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4"/>
  <path d="M 300 155 A 115 115 0 0 1 300 245" stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4"/>
  <path d="M 300 245 A 115 115 0 0 1 200 315" stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4"/>
  <path d="M 200 315 A 115 115 0 0 1 100 245" stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4"/>
  <path d="M 100 245 A 115 115 0 0 1 100 155" stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4"/>
  <path d="M 100 155 A 115 115 0 0 1 200 85" stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4"/>
  
  <!-- Protocol text -->
  <text x="200" y="390" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#374151" text-anchor="middle">AGENT PROTOCOL</text>
</svg>
