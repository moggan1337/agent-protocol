<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Agent Protocol Architecture</text>
  
  <!-- Agent A -->
  <rect x="50" y="80" width="150" height="80" rx="10" fill="#1e293b" stroke="url(#primaryGrad)" stroke-width="2"/>
  <text x="125" y="110" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent A</text>
  <text x="125" y="130" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">OpenAI</text>
  <circle cx="80" cy="100" r="8" fill="url(#primaryGrad)"/>
  
  <!-- Agent B -->
  <rect x="50" y="200" width="150" height="80" rx="10" fill="#1e293b" stroke="url(#secondaryGrad)" stroke-width="2"/>
  <text x="125" y="230" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent B</text>
  <text x="125" y="250" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Anthropic</text>
  <circle cx="80" cy="220" r="8" fill="url(#secondaryGrad)"/>
  
  <!-- Agent C -->
  <rect x="50" y="320" width="150" height="80" rx="10" fill="#1e293b" stroke="url(#greenGrad)" stroke-width="2"/>
  <text x="125" y="350" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent C</text>
  <text x="125" y="370" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Custom</text>
  <circle cx="80" cy="340" r="8" fill="url(#greenGrad)"/>
  
  <!-- Protocol Layer -->
  <rect x="250" y="180" width="300" height="160" rx="15" fill="#0f172a" stroke="url(#primaryGrad)" stroke-width="3" filter="url(#glow)"/>
  <text x="400" y="210" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">AGENT PROTOCOL</text>
  
  <!-- Protocol Components -->
  <rect x="270" y="230" width="260" height="25" rx="5" fill="#1e293b"/>
  <rect x="270" y="230" width="80" height="25" rx="5" fill="url(#primaryGrad)"/>
  <text x="310" y="247" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Messages</text>
  
  <rect x="270" y="260" width="260" height="25" rx="5" fill="#1e293b"/>
  <rect x="270" y="260" width="100" height="25" rx="5" fill="url(#secondaryGrad)"/>
  <text x="320" y="277" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Capabilities</text>
  
  <rect x="270" y="290" width="260" height="25" rx="5" fill="#1e293b"/>
  <rect x="270" y="290" width="90" height="25" rx="5" fill="url(#greenGrad)"/>
  <text x="315" y="307" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Discovery</text>
  
  <rect x="270" y="320" width="260" height="25" rx="5" fill="#1e293b"/>
  <rect x="270" y="320" width="70" height="25" rx="5" fill="url(#orangeGrad)"/>
  <text x="305" y="337" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Routing</text>
  
  <!-- Connection lines -->
  <path d="M200 120 L250 220" stroke="url(#primaryGrad)" stroke-width="2" fill="none"/>
  <circle cx="225" cy="170" r="5" fill="url(#primaryGrad)"/>
  
  <path d="M200 240 L250 260" stroke="url(#secondaryGrad)" stroke-width="2" fill="none"/>
  <circle cx="225" cy="250" r="5" fill="url(#secondaryGrad)"/>
  
  <path d="M200 360 L250 280" stroke="url(#greenGrad)" stroke-width="2" fill="none"/>
  <circle cx="225" cy="320" r="5" fill="url(#greenGrad)"/>
  
  <!-- Return lines -->
  <path d="M550 220 L600 140" stroke="url(#primaryGrad)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M550 260 L600 240" stroke="url(#secondaryGrad)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M550 280 L600 360" stroke="url(#greenGrad)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- External Service -->
  <rect x="600" y="180" width="150" height="100" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="675" y="210" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Registry</text>
  <text x="675" y="235" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Service Discovery</text>
  
  <!-- Arrow to registry -->
  <path d="M550 230 L600 230" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="595,225 605,230 595,235" fill="#64748b"/>
  
  <!-- Transport layer -->
  <rect x="250" y="380" width="300" height="80" rx="10" fill="#0f172a" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="410" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Transport Layer</text>
  
  <rect x="270" y="420" width="80" height="30" rx="5" fill="#1e293b" stroke="url(#primaryGrad)" stroke-width="1"/>
  <text x="310" y="440" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">HTTP</text>
  
  <rect x="360" y="420" width="80" height="30" rx="5" fill="#1e293b" stroke="url(#secondaryGrad)" stroke-width="1"/>
  <text x="400" y="440" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">WebSocket</text>
  
  <rect x="450" y="420" width="80" height="30" rx="5" fill="#1e293b" stroke="url(#greenGrad)" stroke-width="1"/>
  <text x="490" y="440" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Memory</text>
  
  <!-- Connection to protocol -->
  <path d="M400 340 L400 380" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="395,335 405,335 400,345" fill="#64748b"/>
  
  <!-- Features list -->
  <rect x="600" y="300" width="180" height="150" rx="10" fill="#1e293b"/>
  <text x="690" y="330" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Features</text>
  
  <circle cx="615" cy="355" r="4" fill="#10b981"/>
  <text x="625" y="358" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Universal Messages</text>
  
  <circle cx="615" cy="380" r="4" fill="#06b6d4"/>
  <text x="625" y="383" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Capability Discovery</text>
  
  <circle cx="615" cy="405" r="4" fill="#f59e0b"/>
  <text x="625" y="408" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Smart Routing</text>
  
  <circle cx="615" cy="430" r="4" fill="#a855f7"/>
  <text x="625" y="433" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Load Balancing</text>
  
  <!-- Bottom label -->
  <text x="400" y="560" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Like TCP/IP for AI Agents</text>
</svg>
