<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="20" font-weight="600">Architecture</text>
  
  <!-- Protocol Layer (Center) -->
  <rect x="300" y="180" width="200" height="120" rx="12" fill="#1a1a2e" stroke="url(#primary)" stroke-width="2"/>
  <text x="400" y="215" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">AGENT PROTOCOL</text>
  
  <rect x="320" y="235" width="160" height="8" rx="4" fill="#1e293b"/>
  <rect x="320" y="235" width="70" height="8" rx="4" fill="url(#primary)"/>
  <text x="330" y="243" fill="#fff" font-family="system-ui" font-size="8">Messages</text>
  
  <rect x="320" y="250" width="160" height="8" rx="4" fill="#1e293b"/>
  <rect x="320" y="250" width="90" height="8" rx="4" fill="url(#secondary)"/>
  <text x="330" y="258" fill="#fff" font-family="system-ui" font-size="8">Capabilities</text>
  
  <rect x="320" y="265" width="160" height="8" rx="4" fill="#1e293b"/>
  <rect x="320" y="265" width="60" height="8" rx="4" fill="url(#green)"/>
  <text x="330" y="273" fill="#fff" font-family="system-ui" font-size="8">Routing</text>
  
  <!-- Agent A -->
  <rect x="60" y="100" width="140" height="70" rx="10" fill="#1a1a2e" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="130" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">Agent A</text>
  <text x="130" y="150" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">OpenAI</text>
  
  <!-- Agent B -->
  <rect x="60" y="210" width="140" height="70" rx="10" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2"/>
  <text x="130" y="240" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">Agent B</text>
  <text x="130" y="260" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">Anthropic</text>
  
  <!-- Agent C -->
  <rect x="60" y="320" width="140" height="70" rx="10" fill="#1a1a2e" stroke="#10b981" stroke-width="2"/>
  <text x="130" y="350" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">Agent C</text>
  <text x="130" y="370" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">Custom</text>
  
  <!-- Connections to Protocol -->
  <path d="M200 135 L300 220" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <path d="M200 245 L300 240" stroke="#8b5cf6" stroke-width="2" fill="none"/>
  <path d="M200 355 L300 260" stroke="#10b981" stroke-width="2" fill="none"/>
  
  <!-- Return connections -->
  <path d="M500 220 L600 135" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  <path d="M500 240 L600 245" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  <path d="M500 260 L600 355" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  
  <!-- External Services -->
  <rect x="600" y="100" width="150" height="70" rx="10" fill="#1a1a2e" stroke="#64748b" stroke-width="2"/>
  <text x="675" y="130" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">Registry</text>
  <text x="675" y="150" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">Service Discovery</text>
  
  <rect x="600" y="210" width="150" height="70" rx="10" fill="#1a1a2e" stroke="#64748b" stroke-width="2"/>
  <text x="675" y="240" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">Transport</text>
  <text x="675" y="260" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">HTTP / WS / Memory</text>
  
  <!-- Transport Layer -->
  <rect x="300" y="350" width="200" height="60" rx="10" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="400" y="380" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">Transport Layer</text>
  
  <rect x="320" y="390" width="60" height="20" rx="5" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1"/>
  <text x="350" y="404" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="9">HTTP</text>
  
  <rect x="395" y="390" width="60" height="20" rx="5" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="425" y="404" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="9">WebSocket</text>
  
  <rect x="470" y="390" width="60" height="20" rx="5" fill="#1a1a2e" stroke="#10b981" stroke-width="1"/>
  <text x="500" y="404" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="9">Memory</text>
  
  <!-- Arrow to transport -->
  <path d="M400 300 L400 350" stroke="#475569" stroke-width="2" fill="none"/>
  <polygon points="395,295 405,295 400,305" fill="#475569"/>
  
  <!-- Footer -->
  <text x="400" y="480" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="12">Like TCP/IP for AI Agents</text>
</svg>
